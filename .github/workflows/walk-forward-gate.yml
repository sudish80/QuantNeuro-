name: walk-forward-gate

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate-strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run walk-forward gate
        run: |
          python walk_forward_validation.py \
            --ticker BTC-USD \
            --model lstm \
            --activation relu \
            --lookback 20 \
            --epochs 8 \
            --fee-bps 8 \
            --slippage-bps 6 \
            --spread-bps 4 \
            --latency-bps 2 \
            --funding-bps 1 \
            --borrow-bps 1 \
            --enforce-thresholds \
            --min-r2 0.35 \
            --max-mape 8.0 \
            --max-rmse-std-ratio 0.35 \
            --summary-path output/walk_forward_summary.json

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: walk-forward-summary
          path: output/walk_forward_summary.json
