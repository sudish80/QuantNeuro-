name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================================================
  # LINT & STYLE CHECKS
  # ========================================================================
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort pylint

      - name: Format check with Black
        run: black --check --diff .
        continue-on-error: true

      - name: Import sorting with isort
        run: isort --check-only --diff .
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics
        continue-on-error: true

  # ========================================================================
  # TYPE CHECKING
  # ========================================================================
  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests types-PyYAML
          pip install -r requirements.txt || echo "Some packages may not have stub files"

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports --no-error-summary || true

  # ========================================================================
  # UNIT & INTEGRATION TESTS
  # ========================================================================
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trading_db_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v --tb=short
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trading_db_test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: |
            coverage.xml
            htmlcov/

  # ========================================================================
  # SECURITY SCANNING
  # ========================================================================
  security:
    name: Security & Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check dependencies for vulnerabilities
        run: |
          pip install safety
          safety check --json || true

  # ========================================================================
  # BUILD DOCKER IMAGE
  # ========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, type-check, test, security]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-image-results.sarif'

  # ========================================================================
  # DEPLOYMENT DECISION GATE
  # ========================================================================
  deployment-gate:
    name: Deployment Gate (Decision)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      should-deploy: ${{ steps.gate.outputs.should-deploy }}

    steps:
      - name: Check deployment preconditions
        id: gate
        run: |
          # Decision logic:
          # - All previous jobs must pass (implicit via needs)
          # - Run risk checks (can be customized)
          echo "=== Deployment Gate Analysis ==="
          echo "Branch: ${{ github.ref }}"
          echo "Event: ${{ github.event_name }}"
          echo "All checks passed: true"
          echo "should-deploy=true" >> $GITHUB_OUTPUT

      - name: Notify deployment readiness
        if: steps.gate.outputs.should-deploy == 'true'
        run: |
          echo "✅ DEPLOYMENT APPROVED"
          echo "Ready for: staging → production"

  # ========================================================================
  # STAGING DEPLOYMENT
  # ========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deployment-gate]
    if: needs.deployment-gate.outputs.should-deploy == 'true'
    environment:
      name: staging
      url: https://staging-api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging environment
        run: |
          echo "🚀 Deploying to staging..."
          # Replace with actual deployment steps:
          # - SSH to staging server
          # - Pull latest image
          # - docker-compose up -d
          # - Run smoke tests
          echo "✅ Staging deployment completed"

      - name: Run smoke tests against staging
        run: |
          echo "Running smoke tests..."
          # Replace with actual smoke test commands
          curl -f https://staging-api.example.com/health || exit 1
          echo "✅ Smoke tests passed"

  # ========================================================================
  # PRODUCTION DEPLOYMENT (Manual Approval Required)
  # ========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Notify deployment start
        run: |
          echo "🚀 Starting production deployment..."
          echo "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Deploy to production
        run: |
          echo "Deploying trading model to production..."
          # Replace with actual production deployment:
          # - Blue-green deployment
          # - Canary rollout (10% → 50% → 100%)
          # - Health checks after each stage
          # - Automatic rollback if failures detected
          echo "✅ Production deployment completed"

      - name: Validate production deployment
        run: |
          echo "Validating production..."
          # Check API health
          curl -f https://api.example.com/health
          # Check metrics are being exported
          curl -f https://api.example.com/metrics
          echo "✅ Production validation passed"

      - name: Create deployment release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Production Release #${{ github.run_number }}
          body: |
            Automated production deployment
            - Commit: ${{ github.sha }}
            - Branch: ${{ github.ref }}
            - Timestamp: ${{ github.event.head_commit.timestamp }}

  # ========================================================================
  # ROLLBACK PROCEDURE
  # ========================================================================
  rollback:
    name: Rollback Handler
    runs-on: ubuntu-latest
    if: failure() && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Trigger automatic rollback
        run: |
          echo "⚠️  DEPLOYMENT FAILURE DETECTED - INITIATING ROLLBACK"
          # Replace with actual rollback logic:
          # - Redeploy previous stable version
          # - Notify ops team
          # - Open incident ticket
          echo "Rollback initiated"

      - name: Notify team
        run: |
          echo "🔴 Deployment failed and rolled back"
          # Send Slack/email notification
