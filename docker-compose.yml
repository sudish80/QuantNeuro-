version: '3.9'

services:
  # Training and production runner
  trading-model:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-model
    environment:
      - PYTORCH_CUDA=1
      - MATPLOTLIB_BACKEND=Agg
      - JOURNAL_PASSPHRASE=${JOURNAL_PASSPHRASE:-default_passphrase}
      - TRADE_JOURNAL_PLAINTEXT_ENABLED=false
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/trading_db
      - PROMETHEUS_URL=http://prometheus:9090
    volumes:
      - ./state:/app/state
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "5000:5000"  # API server
      - "8000:8000"  # Additional service
    depends_on:
      - postgres
      - prometheus
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: trading-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=trading_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/alembic_sql/versions:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: trading-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - trading-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: trading-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - trading-network
    restart: unless-stopped

  # Redis for caching and task queue
  redis:
    image: redis:7-alpine
    container_name: trading-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Jupyter Lab for interactive development
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-jupyter
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/trading_db
    volumes:
      - ./:/app
      - jupyter_data:/root/.jupyter
    ports:
      - "8888:8888"
    depends_on:
      - postgres
    networks:
      - trading-network
    command: jupyter lab --ip=0.0.0.0 --allow-root --no-browser
    restart: unless-stopped

networks:
  trading-network:
    driver: bridge

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  redis_data:
  jupyter_data:
